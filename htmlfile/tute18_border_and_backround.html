<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=S, initial-scale=1.0">
    <title>BORDER AND BACKGROUND</title>
    <style>
        #firstpar {
            border-style: double;
            background-color: royalblue;
            height: 14em;
            width: 194px;
            border-width: 25px;
            border-color: blue;
            border-radius: 14px;
        }
        
        #secondpar {
            border-style: double;
            background-color: rgb(220, 65, 225);
            height: 14em;
            width: 194px;
            /* now we can  chande the individual color of the parragraph*/
            border-top: 5px solid red;
            border-bottom: 5px solid green;
            border-left: 5px solid yellow;
            border-right: 5px solid blue;
            border-top-left-radius: 23px;
            border-top-right-radius: 24px;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 26px;
        }
        
        p {
            color: blue;
        }
        
        #thirdpar {
            border-style: dotted;
            height: 15em;
            width: 122px;
            background-image: url('C:\cc++\htmlfile\sidd.jpg');
            background: no-repeat;
            /* it is for no repeat the imagr continously it can be repeat with x and y axis */
            background-position: center center;
            /* it can be top center top top top botton etc it is a cennter*/
        }
    </style>
</head>

<body>
    <h3> THIS IS FOR BORDER AND BACKGROUND </h3>
    <p id="firstpar">This is the first paragraph in the page

    </p>



    
    <h3> THIS IS FOR BORDER AND BACKGROUND individual </h3>
    <p id="secondpar">This is the second paragraph in the page </p>






    <h3> THIS IS FOR BORDER AND BACKGROUND IMAGE </h3>
    <p id="thirdpar">This is the third paragraph in the page for image </p>

</body>

</html>
