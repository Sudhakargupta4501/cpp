<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDS an CLASSES </title>
</head>

<body>
    <h2>THIS IS IDS AND CLASS </h2>

    <!-- ek he name ke do id nahi hona chaiye  but class (multiple element mai laga sakete hai) bana saketa hai isha kahi par decleare kar sakate hai but ids no-->
    <div id="mainbox" class="red black border"></div>
    <!-- . is for class call and # is for ids to make dirtct like input -->
    <!-- span. press enter to make class   -->
    <span class="class"> 

    </span>
    <!-- span# and press neter -->
    <span id="main"></span>
    <!-- .span+ enter  take div as a defalt-->
    <div class="span"></div>
    <!-- many class ke liye multiply karte hai jaise -->
    <!-- .myclaaa.myclass2.myclass3 + tab -->
    <div class="myclass myclass2 myclass3"></div>


</body>

</html>
